<svg xmlns="http://www.w3.org/2000/svg" width="860" height="520" viewBox="0 0 860 520" role="img" aria-labelledby="title desc">
  <title id="title">Bein profile card</title>
  <desc id="desc">Rounded profile cards showing skills, projects, and contact information.</desc>
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fcfcfd"/>
    </linearGradient>
    <linearGradient id="coverBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#21164d"/>
      <stop offset="55%" stop-color="#43308f"/>
      <stop offset="100%" stop-color="#1b183f"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#111827" flood-opacity="0.12"/>
    </filter>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #1f2937; }
      .title { font-size: 22px; font-weight: 700; }
      .skillName { font-size: 15px; font-weight: 600; fill: #374151; }
      .projectTitle { font-size: 13px; font-weight: 600; }
      .projectDesc { font-size: 12px; fill: #6b7280; }
      .contact { font-size: 17px; font-weight: 600; }
      .icon { font-size: 14px; font-weight: 700; }
    </style>
  </defs>

  <g>
    <rect x="10.75" y="10.75" width="398.5" height="318.5" rx="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="34" y="56" class="title">🛠️ 技能（Skills）</text>
    <g transform="translate(38 82)">
      <g transform="translate(15 0)">
        <rect width="74" height="74" rx="18" fill="#f3f4f6" stroke="#e5e7eb"/>
        <text x="37" y="45" font-size="34" text-anchor="middle">PS</text>
        <text x="37" y="98" class="skillName" text-anchor="middle">photoshop</text>
      </g>
      <g transform="translate(135 0)">
        <rect width="74" height="74" rx="18" fill="#f3f4f6" stroke="#e5e7eb"/>
        <text x="37" y="45" font-size="34" text-anchor="middle">AI</text>
        <text x="37" y="98" class="skillName" text-anchor="middle">illustrator</text>
      </g>
      <g transform="translate(255 0)">
        <rect width="74" height="74" rx="18" fill="#f3f4f6" stroke="#e5e7eb"/>
        <text x="37" y="45" font-size="34" text-anchor="middle">CAD</text>
        <text x="37" y="98" class="skillName" text-anchor="middle">Auto CAD</text>
      </g>
      <g transform="translate(15 128)">
        <rect width="74" height="74" rx="18" fill="#f3f4f6" stroke="#e5e7eb"/>
        <text x="37" y="45" font-size="34" text-anchor="middle">3D</text>
        <text x="37" y="98" class="skillName" text-anchor="middle">Autodesk 3ds Max</text>
      </g>
      <g transform="translate(135 128)">
        <rect width="74" height="74" rx="18" fill="#f3f4f6" stroke="#e5e7eb"/>
        <text x="37" y="45" font-size="32" text-anchor="middle">PR</text>
        <text x="37" y="98" class="skillName" text-anchor="middle">Premiere</text>
      </g>
      <g transform="translate(255 128)">
        <rect width="74" height="74" rx="18" fill="#f3f4f6" stroke="#e5e7eb"/>
        <text x="37" y="45" font-size="34" text-anchor="middle">AE</text>
        <text x="37" y="98" class="skillName" text-anchor="middle">After Effects</text>
      </g>
    </g>
  </g>

  <g>
    <rect x="430.75" y="10.75" width="418.5" height="318.5" rx="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="454" y="56" class="title">🥇 项目展示（Projects）</text>
    <rect x="454.75" y="80.75" width="370.5" height="222.5" rx="18" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <path d="M472 80 H808 A18 18 0 0 1 826 98 V192 H454 V98 A18 18 0 0 1 472 80 Z" fill="url(#coverBg)"/>
    <circle cx="486" cy="115" r="18" fill="#ff8ac7" opacity="0.26"/>
    <circle cx="791" cy="155" r="10" fill="#f59e0b" opacity="0.75"/>
    <circle cx="764" cy="103" r="7" fill="#a78bfa" opacity="0.8"/>
    <path d="M791 101l10 13 16 2-12 10 4 15-14-8-14 8 4-15-12-10 16-2z" fill="none" stroke="#f59e0b" stroke-width="3"/>
    <text x="640" y="128" font-size="24" font-weight="700" text-anchor="middle" style="fill: #ffffff;">SPARK AI</text>
    <text x="640" y="156" font-size="22" font-weight="700" text-anchor="middle" style="fill: #ffffff;">Hackathon</text>
    <line x1="454" y1="192" x2="826" y2="192" stroke="#ffffff"/>
    <rect x="468" y="214" width="36" height="36" rx="10" fill="#ffffff"/>
    <path d="M476 240 L480 228 L486 233 L492 221 L499 226" fill="none" stroke="#79b8ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M486 215 L491 221 L499 222 L493 227 L495 235 L488 231 L481 235 L483 227 L477 222 L485 221 Z" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-linejoin="round"/>
    <text x="520" y="220" font-size="14" font-weight="700">SPARK AI</text>
    <text x="520" y="240" font-size="14" font-weight="700">Hackathon</text>

    <rect x="468" y="262" width="36" height="36" rx="10" fill="#1f2025"/>
    <text x="486" y="287" font-size="18" font-weight="700" fill="#f4d38a" text-anchor="middle">M</text>
    <text x="520" y="274" font-size="14" font-weight="700">Monad Blitz</text>
    <text x="520" y="290" font-size="11" fill="#8b95a7">Wery short descri</text>
  </g>

  <g>
    <rect x="10.75" y="360.75" width="838.5" height="123.5" rx="22" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
    <text x="34" y="390" class="title">💬 联络方式（Contact）</text>
    <circle cx="42" cy="425" r="12" fill="#fff4d6"/>
    <text x="42" y="430" class="icon" text-anchor="middle">S</text>
    <text x="66" y="431" class="contact">Wechat: llllpptt</text>
    <circle cx="42" cy="462" r="12" fill="#f3e8ff"/>
    <text x="42" y="467" class="icon" text-anchor="middle">W</text>
    <text x="66" y="468" class="contact">Email: 93335133@qq.com</text>
  </g>
</svg>
